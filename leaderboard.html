<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>排行榜 Leaderboard</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#f4fff6;
    font-family:"Microsoft JhengHei",sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2d6a4f;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
}

th{
    background:#2d6a4f;
    color:white;
    padding:14px;
}

td{
    padding:14px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#f7f7f7;
}

.rank-1{
    background:#ffe066 !important;
    font-weight:bold;
}

.rank-2{
    background:#dee2e6 !important;
}

.rank-3{
    background:#ffd8a8 !important;
}

.refresh-text{
    text-align:center;
    color:#666;
    margin-top:20px;
}

.empty-text{
    text-align:center;
    color:#999;
    padding:30px;
}

</style>
</head>

<body>

<div class="container">

<h1>
🏆 排行榜 Leaderboard
</h1>

<table>

<thead>
<tr>
<th>排名 Rank</th>
<th>工號 Employee ID</th>
<th>分數 Score</th>
<th>時間 Time</th>
<th>日期 Date</th>
</tr>
</thead>

<tbody id="leaderboard-body">

</tbody>

</table>

<p class="refresh-text">
每 10 秒自動更新一次
</p>

</div>

<!-- 讀取設定（Google 試算表 ID 等） -->
<script src="config.js"></script>

<script>

// 把用時（秒）格式化為 mm:ss.xx
function formatTime(timeInSeconds){
    const t = Number(timeInSeconds);
    if(!isFinite(t)) return String(timeInSeconds || '');

    const minutes = Math.floor(t / 60);
    const seconds = Math.floor(t % 60);
    const milliseconds = Math.floor((t % 1) * 100);

    return (
        String(minutes).padStart(2,'0') + ':' +
        String(seconds).padStart(2,'0') + '.' +
        String(milliseconds).padStart(2,'0')
    );
}

// 解析 gviz 回傳（包著 google.visualization.Query.setResponse(...)）
function parseGvizResponse(text){
    const json = text
        .replace(/^[\s\S]*?setResponse\(/, '')
        .replace(/\);?\s*$/, '');
    return JSON.parse(json);
}

// 抓取某分頁資料表；失敗或查無資料表回傳 null（空字串 = 預設第一個分頁）
async function fetchGvizTable(sheetId, sheetName){
    try{
        let url = 'https://docs.google.com/spreadsheets/d/' + sheetId +
                  '/gviz/tq?tqx=out:json';
        if(sheetName) url += '&sheet=' + encodeURIComponent(sheetName);

        const response = await fetch(url);
        const text = await response.text();
        const data = parseGvizResponse(text);

        if(!data || !data.table || !data.table.cols) return null;
        return data.table;
    }catch(err){
        return null;
    }
}

async function loadLeaderboard(){

    const cfg = window.EHS_CONFIG;
    const tbody = document.getElementById('leaderboard-body');

    if(!cfg || !cfg.sheet || !cfg.sheet.id || cfg.sheet.id === 'SHEET_ID'){
        tbody.innerHTML =
            '<tr><td colspan="5" class="empty-text">尚未設定 Google 試算表（請編輯 config.js）</td></tr>';
        return;
    }

    try{

        const { id, name, columns } = cfg.sheet;

        // 先用設定的分頁名稱讀取；對不上時退讀預設（第一個）分頁
        let table = await fetchGvizTable(id, name);
        if(!table) table = await fetchGvizTable(id, '');
        if(!table){
            tbody.innerHTML =
                '<tr><td colspan="5" class="empty-text">讀取排行榜失敗（請確認分頁名稱與共用權限）</td></tr>';
            return;
        }

        const cols = (table.cols || []).map(
            c => (c.label || '').trim().toLowerCase()
        );

        const idxOf = (label, fallback) => {
            const i = cols.indexOf(String(label || '').trim().toLowerCase());
            return i >= 0 ? i : fallback;
        };

        const idx = {
            id:    idxOf(columns.id, 1),
            score: idxOf(columns.score, 2),
            time:  idxOf(columns.time, 3),
            date:  idxOf(columns.date, 4),
        };

        let rows = (table.rows || []).map(r => {
            const v = i => (i >= 0 && r.c[i]) ? r.c[i].v : null;
            const f = i => (i >= 0 && r.c[i]) ? (r.c[i].f != null ? r.c[i].f : r.c[i].v) : null;
            return {
                id: v(idx.id),
                score: Number(v(idx.score)),
                time: Number(v(idx.time)),
                date: f(idx.date),
            };
        }).filter(item => item.id != null && item.id !== '');

        // 排序：分數高優先，分數相同比時間短
        rows.sort((a,b) => (b.score - a.score) || (a.time - b.time));

        tbody.innerHTML = '';

        if(rows.length === 0){
            tbody.innerHTML =
                '<tr><td colspan="5" class="empty-text">目前還沒有成績資料</td></tr>';
            return;
        }

        rows.forEach((item,index)=>{

            const tr = document.createElement('tr');

            if(index===0){
                tr.classList.add('rank-1');
            }else if(index===1){
                tr.classList.add('rank-2');
            }else if(index===2){
                tr.classList.add('rank-3');
            }

            tr.innerHTML =
                '<td>#' + (index + 1) + '</td>' +
                '<td>' + item.id + '</td>' +
                '<td>' + item.score + ' / 50</td>' +
                '<td>' + formatTime(item.time) + '</td>' +
                '<td>' + (item.date || '') + '</td>';

            tbody.appendChild(tr);

        });

    }catch(err){

        console.error(err);
        tbody.innerHTML =
            '<tr><td colspan="5" class="empty-text">讀取排行榜失敗，請稍後再試</td></tr>';

    }

}

loadLeaderboard();

setInterval(loadLeaderboard, 10000);

</script>

</body>
</html>
