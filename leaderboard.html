<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>排行榜 Leaderboard</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#f4fff6;
    font-family:"Microsoft JhengHei",sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2d6a4f;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
}

th{
    background:#2d6a4f;
    color:white;
    padding:14px;
}

td{
    padding:14px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#f7f7f7;
}

.rank-1{
    background:#ffe066 !important;
    font-weight:bold;
}

.rank-2{
    background:#dee2e6 !important;
}

.rank-3{
    background:#ffd8a8 !important;
}

.refresh-text{
    text-align:center;
    color:#666;
    margin-top:20px;
}

.empty-text{
    text-align:center;
    color:#999;
    padding:30px;
}

</style>
</head>

<body>

<div class="container">

<h1>
🏆 排行榜 Leaderboard
</h1>

<table>

<thead>
<tr>
<th>排名 Rank</th>
<th>工號 Employee ID</th>
<th>分數 Score</th>
<th>時間 Time</th>
<th>日期 Date</th>
</tr>
</thead>

<tbody id="leaderboard-body">

</tbody>

</table>

<p class="refresh-text">
每 10 秒自動更新一次
</p>

</div>

<!-- 讀取設定（後端 Worker 網址 api.baseUrl） -->
<script src="config.js"></script>

<script>

// 把用時（秒）格式化為 mm:ss.xx
function formatTime(timeInSeconds){
    const t = Number(timeInSeconds);
    if(!isFinite(t)) return String(timeInSeconds || '');

    const minutes = Math.floor(t / 60);
    const seconds = Math.floor(t % 60);
    const milliseconds = Math.floor((t % 1) * 100);

    return (
        String(minutes).padStart(2,'0') + ':' +
        String(seconds).padStart(2,'0') + '.' +
        String(milliseconds).padStart(2,'0')
    );
}

// 從後端（Cloudflare Worker）讀取排行榜
async function fetchLeaderboard(){
    const base = window.EHS_CONFIG.api.baseUrl.trim().replace(/\/+$/, '');
    const res = await fetch(base + '/leaderboard');
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    return (Array.isArray(data) ? data : []).map(item => ({
        id: item.id,
        score: Number(item.score),
        time: Number(item.time),
        date: item.date,
    })).filter(item => item.id != null && item.id !== '');
}

async function loadLeaderboard(){

    const cfg = window.EHS_CONFIG;
    const tbody = document.getElementById('leaderboard-body');

    const baseUrl = (cfg && cfg.api && cfg.api.baseUrl) ? cfg.api.baseUrl.trim() : '';
    if(!/^https?:\/\//.test(baseUrl)){
        tbody.innerHTML =
            '<tr><td colspan="5" class="empty-text">尚未設定後端網址（請編輯 config.js 的 api.baseUrl）</td></tr>';
        return;
    }

    try{

        const rows = await fetchLeaderboard();

        // 排序：分數高優先，分數相同比時間短
        rows.sort((a,b) => (b.score - a.score) || (a.time - b.time));

        tbody.innerHTML = '';

        if(rows.length === 0){
            tbody.innerHTML =
                '<tr><td colspan="5" class="empty-text">目前還沒有成績資料</td></tr>';
            return;
        }

        rows.forEach((item,index)=>{

            const tr = document.createElement('tr');

            if(index===0){
                tr.classList.add('rank-1');
            }else if(index===1){
                tr.classList.add('rank-2');
            }else if(index===2){
                tr.classList.add('rank-3');
            }

            // 用 textContent 填入使用者資料（工號/日期），避免 XSS
            const cells = [
                '#' + (index + 1),
                item.id,
                item.score + ' / 100',
                formatTime(item.time),
                item.date || '',
            ];
            cells.forEach(value => {
                const td = document.createElement('td');
                td.textContent = value;
                tr.appendChild(td);
            });

            tbody.appendChild(tr);

        });

    }catch(err){

        console.error(err);
        tbody.innerHTML =
            '<tr><td colspan="5" class="empty-text">讀取排行榜失敗，請稍後再試</td></tr>';

    }

}

loadLeaderboard();

setInterval(loadLeaderboard, 10000);

</script>

</body>
</html>
