name = "ehs-leaderboard"
main = "worker.js"
compatibility_date = "2025-01-01"

# Durable Object 綁定：程式裡用 env.LEADERBOARD 取得實例。
[[durable_objects.bindings]]
name = "LEADERBOARD"
class_name = "Leaderboard"

# 首次部署需宣告 migration，建立 SQLite-backed Durable Object 類別。
# SQLite-backed DO 在 Workers 免費方案即可使用（5GB 額度），無需付費升級。
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Leaderboard"]
